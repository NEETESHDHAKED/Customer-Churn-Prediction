<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Churn Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card shadow-lg p-4">

        <h1 class="text-center mb-4">
            Customer Churn Prediction
        </h1>

        <form action="/predict" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Gender</label>

                    <select class="form-select" name="gender">

                        <option>Female</option>
                        <option>Male</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Senior Citizen</label>

                    <select class="form-select" name="SeniorCitizen">

                        <option value="0">No</option>
                        <option value="1">Yes</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Partner</label>

                    <select class="form-select" name="Partner">

                        <option>No</option>
                        <option>Yes</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Dependents</label>

                    <select class="form-select" name="Dependents">

                        <option>No</option>
                        <option>Yes</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Tenure</label>

                    <input
                        type="number"
                        class="form-control"
                        name="tenure"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Phone Service</label>

                    <select class="form-select" name="PhoneService">

                        <option>No</option>
                        <option>Yes</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Multiple Lines</label>

                    <select class="form-select" name="MultipleLines">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No phone service</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Internet Service</label>

                    <select class="form-select" name="InternetService">

                        <option>DSL</option>
                        <option>Fiber optic</option>
                        <option>No</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Online Security</label>

                    <select class="form-select" name="OnlineSecurity">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Online Backup</label>

                    <select class="form-select" name="OnlineBackup">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Device Protection</label>

                    <select class="form-select" name="DeviceProtection">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Tech Support</label>

                    <select class="form-select" name="TechSupport">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Streaming TV</label>

                    <select class="form-select" name="StreamingTV">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Streaming Movies</label>

                    <select class="form-select" name="StreamingMovies">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Contract</label>

                    <select class="form-select" name="Contract">

                        <option>Month-to-month</option>
                        <option>One year</option>
                        <option>Two year</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Paperless Billing</label>

                    <select class="form-select" name="PaperlessBilling">

                        <option>No</option>
                        <option>Yes</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Payment Method</label>

                    <select class="form-select" name="PaymentMethod">

                        <option>Electronic check</option>
                        <option>Mailed check</option>
                        <option>Bank transfer (automatic)</option>
                        <option>Credit card (automatic)</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Monthly Charges</label>

                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        name="MonthlyCharges"
                        required>

                </div>

                <div class="col-md-12 mb-3">

                    <label>Total Charges</label>

                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        name="TotalCharges"
                        required>

                </div>

            </div>

            <div class="text-center">

                <button class="btn btn-primary btn-lg">

                    Predict Customer Churn

                </button>

            </div>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
